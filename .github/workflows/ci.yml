name: CI

# Runs checks on every push/PR, and deploys to GitHub Pages ONLY when the
# checks pass on main — so the live site can never go out broken.
# Note: no untrusted github.event.* input is used in any run step (only trusted
# context fields and action outputs), so there is no workflow-injection surface.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    name: Validate (data integrity + JS syntax)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-audit --no-fund
      - run: npm run validate
      - run: npm run refresh:check   # data.js must be in canonical (auto-refresh) form
      - run: npm test

  smoke:
    name: Smoke (browser renders)
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-audit --no-fund
      - run: npx playwright install --with-deps chromium
      - name: Serve and run smoke test
        run: |
          python3 -m http.server 4173 >/dev/null 2>&1 &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do curl -sf http://localhost:4173/ >/dev/null && break; sleep 0.5; done
          npm run smoke
      - name: Stop server
        if: always()
        run: kill "$SERVER_PID" 2>/dev/null || true

  deploy:
    name: Deploy to GitHub Pages
    needs: [validate, smoke]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
