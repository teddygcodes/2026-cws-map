name: CI

# Runs checks on every push/PR: data integrity + unit tests, then a production
# build served by `next start` and exercised with Playwright. Deploys are handled
# by Vercel's Git integration (the app is a Next.js build, not a static artifact),
# so there is no deploy job here.
# Note: no untrusted github.event.* input is used in any run step (only trusted
# context fields and action outputs), so there is no workflow-injection surface.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate (data integrity + JS syntax)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-audit --no-fund
      - run: npm run validate
      - run: npm run refresh:check   # data.js must be in canonical (auto-refresh) form
      - run: npm test

  smoke:
    name: Smoke (browser renders)
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-audit --no-fund
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - name: Serve and run smoke test
        run: |
          npm run start >/dev/null 2>&1 &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 60); do curl -sf http://localhost:3000/ >/dev/null && break; sleep 0.5; done
          BASE=http://localhost:3000 npm run smoke
      - name: Stop server
        if: always()
        run: kill "$SERVER_PID" 2>/dev/null || true
