<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Source for docs/og-card.png (1200x630 social link-preview card). Regenerate with:
       chrome --headless=new --window-size=1200,630 --force-device-scale-factor=1 \
              --screenshot=docs/og-card.png docs/og-card.html -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1200px; height: 630px; overflow: hidden; }
    .card {
      width: 1200px; height: 630px; position: relative;
      background:
        radial-gradient(1100px 700px at 18% -10%, #1b1b1f 0%, #0e0e10 60%),
        #0e0e10;
      border-bottom: 12px solid #e8202a;
      font-family: "Oswald", sans-serif; color: #f4f4f5;
      padding: 64px 72px;
    }
    .kicker { font-weight: 700; letter-spacing: .32em; color: #e8202a; font-size: 26px; text-transform: uppercase; }
    h1 {
      font-family: "Anton", sans-serif; font-weight: 400; text-transform: uppercase;
      font-size: 120px; line-height: .92; letter-spacing: .005em; margin-top: 18px;
    }
    h1 .yr { color: #e8202a; }
    .sub { margin-top: 26px; color: #c9c9d0; font-size: 30px; letter-spacing: .04em; font-weight: 500; }
    .sub b { color: #fff; font-weight: 600; }

    /* pin motif (echoes the map markers) */
    .pins { position: absolute; left: 72px; bottom: 56px; display: flex; gap: 22px; align-items: flex-end; }
    .pin {
      width: 46px; height: 46px; border-radius: 50% 50% 50% 0; background: #e8202a;
      transform: rotate(-45deg); border: 3px solid #fff; box-shadow: 0 8px 18px rgba(0,0,0,.5);
      display: grid; place-items: center;
    }
    .pin span { transform: rotate(45deg); color: #fff; font-family: "Anton", sans-serif; font-size: 20px; line-height: 1; }

    .url {
      position: absolute; right: 72px; bottom: 64px; text-align: right;
      font-family: "Oswald", sans-serif; color: #9a9aa3; font-size: 22px; letter-spacing: .06em; text-transform: uppercase;
    }
    .url b { color: #f4f4f5; display: block; font-size: 26px; letter-spacing: .04em; }
  </style>
</head>
<body>
  <div class="card">
    <div class="kicker">Road to Omaha</div>
    <h1><span class="yr">2026</span> NCAA<br />Baseball Tournament</h1>
    <div class="sub">Interactive map &middot; <b>live scores</b> &middot; all 16 regionals</div>

    <div class="pins">
      <div class="pin"><span>1</span></div>
      <div class="pin"><span>2</span></div>
      <div class="pin"><span>3</span></div>
      <div class="pin"><span>4</span></div>
      <div class="pin"><span>5</span></div>
    </div>
    <div class="url"><b>teddygcodes.github.io</b>/2026-cws-map</div>
  </div>
</body>
</html>
